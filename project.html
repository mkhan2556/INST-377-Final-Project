<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Currency Converter - Project</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Currency Converter</h1>

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="project.html">Project Funtionality</a>
  </div>
  <p>
    This tool allows users to convert currency values in real time using live exchange rates.
    Enter an amount, choose currencies, and view both the result and historical data.
  </p>

  <section>
    <h2>Convert Currency</h2>

    <label>From:</label>
    <select id="fromCurrency">
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
      <option value="GBP">GBP</option>
      <option value="AUD">AUD</option>
      <option value="CAD">CAD</option>
      <option value="JPY">JPY</option>
    </select>

    <label>To:</label>
    <select id="toCurrency">
      <option value="EUR">EUR</option>
      <option value="USD">USD</option>
      <option value="GBP">GBP</option>
      <option value="AUD">AUD</option>
      <option value="CAD">CAD</option>
      <option value="JPY">JPY</option>
    </select>

    <br><br>

    <label>Amount:</label>
    <input type="number" id="amount" placeholder="Enter amount" min="1">

    <br><br>

    <button id="convertBtn">Convert</button>
  </section>

  
  <section>
    <h2>Result</h2>
    <p id="convertedAmount"></p>
    <p id="exchangeRate"></p>
    <p id="date"></p>
  </section>

  
  <section>
    <h2>Conversion History</h2>
    <ul id="historyList"></ul>
  </section>

 
  <section>
    <h2>Conversion Chart</h2>
    <canvas id="historyChart" width="400" height="200"></canvas>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
